# Gateway
spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: book-msvc
              uri: http://localhost:8081
              predicates:
                - Path=/books/api/v1/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: username
                    fallbackUri: forward:/fallback/books
                    statusCodes:
                      - 500
                      - 502
                      - 503
                      - 504

# Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 4
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 7s
    instances:
      username:
        base-config: default

  timelimiter:
    configs:
      default:
        timeout-duration: 3s
    instances:
      username:
        base-config: default