name: CI - Fast Checks

on:
  push:
    branches:
      - develop
      - feature/**
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  fast-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: mvn test
