name: CI - Unit Tests

on:
  workflow_dispatch:

jobs:
  fast-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: mvn test
