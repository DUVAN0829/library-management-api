name: CI - Integrations Tests

on:
  workflow_dispatch:

jobs:
  full-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Run full build (unit + integration)
        run: mvn verify