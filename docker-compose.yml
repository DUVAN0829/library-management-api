services:

  otel-lgtm:
    image: grafana/otel-lgtm
    container_name: otel-lgtm
    restart: always
    ports:
      - "3000:3000"
      - "4318:4318"
      - "4317:4317"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - library-net
    healthcheck:                                          # ← CAMBIO
      test: ["CMD", "sh", "-c", "test -f /tmp/ready"]   # ← CAMBIO
      interval: 10s                                      # ← CAMBIO
      timeout: 5s                                        # ← CAMBIO
      retries: 15                                        # ← CAMBIO
      start_period: 30s                                  # ← CAMBIO

  mysql:
    image: mysql:8.3
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: library
    ports:
      - "3307:3306"
    networks:
      - library-net

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    networks:
      - library-net

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      - library-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: keycloak
    command: start-dev --import-realm
    restart: always
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    ports:
      - "8080:8080"
    networks:
      - library-net

  config-server:
    image: duvangonzalez09/config-server
    container_name: config-server
    restart: always
    depends_on:
      - mysql
      - postgres
      - kafka
      - keycloak
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8888:8888"
    networks:
      - library-net

  gateway-msvc:
    image: duvangonzalez09/gateway-msvc
    container_name: gateway-msvc
    restart: always
    depends_on:
      config-server:                       # ← CAMBIO (formato extendido)
        condition: service_started
      otel-lgtm:                           # ← CAMBIO
        condition: service_healthy         # ← CAMBIO
    environment:
      SERVER_PORT: 8090
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_PROFILES_ACTIVE: prod
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/library-management-api
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/library-management-api/protocol/openid-connect/certs
      BOOK_MSVC_URL: http://book-msvc:8081
      COPY_MSVC_URL: http://copy-msvc:8082
      LOAN_MSVC_URL: http://loan-msvc:8083
      USER_MSVC_URL: http://user-msvc:8084
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    ports:
      - "8090:8090"
    networks:
      - library-net

  book-msvc:
    image: duvangonzalez09/book-msvc
    container_name: book-msvc
    restart: always
    depends_on:
      gateway-msvc:                        # ← CAMBIO (formato extendido)
        condition: service_started
      otel-lgtm:                           # ← CAMBIO
        condition: service_healthy         # ← CAMBIO
    environment:
      SERVER_PORT: 8081
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: library
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/library-management-api
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/library-management-api/protocol/openid-connect/certs
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    ports:
      - "8081:8081"
    networks:
      - library-net

  user-msvc:
    image: duvangonzalez09/user-msvc
    container_name: user-msvc
    restart: always
    depends_on:
      gateway-msvc:                        # ← CAMBIO (formato extendido)
        condition: service_started
      otel-lgtm:                           # ← CAMBIO
        condition: service_healthy         # ← CAMBIO
    environment:
      SERVER_PORT: 8084
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: library
      DB_USERNAME: root
      DB_PASSWORD: root
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/library-management-api
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/library-management-api/protocol/openid-connect/certs
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_CLIENT_SECRET: kzrQJ8b98D6WhCogcWIVO0V7Tkp5HjOV
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    ports:
      - "8084:8084"
    networks:
      - library-net

  loan-msvc:
    image: duvangonzalez09/loan-msvc
    container_name: loan-msvc
    restart: always
    depends_on:
      gateway-msvc:                        # ← CAMBIO (formato extendido)
        condition: service_started
      otel-lgtm:                           # ← CAMBIO
        condition: service_healthy         # ← CAMBIO
    environment:
      SERVER_PORT: 8083
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: library
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKER: kafka:9092
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/library-management-api
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/library-management-api/protocol/openid-connect/certs
      COPY_MSVC_URL: http://copy-msvc:8082
      USER_MSVC_URL: http://user-msvc:8084
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    ports:
      - "8083:8083"
    networks:
      - library-net

  copy-msvc:
    image: duvangonzalez09/copy-msvc
    container_name: copy-msvc
    restart: always
    depends_on:
      gateway-msvc:                        # ← CAMBIO (formato extendido)
        condition: service_started
      otel-lgtm:                           # ← CAMBIO
        condition: service_healthy         # ← CAMBIO
    environment:
      SERVER_PORT: 8082
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: library
      DB_USERNAME: root
      DB_PASSWORD: root
      KAFKA_BROKER: kafka:9092
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/library-management-api
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/library-management-api/protocol/openid-connect/certs
      BOOK_MSVC_URL: http://book-msvc:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    ports:
      - "8082:8082"
    networks:
      - library-net

networks:
  library-net:
    driver: bridge