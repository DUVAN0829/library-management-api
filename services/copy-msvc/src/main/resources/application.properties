spring.application.name=copy-msvc

# Server port
server.port=8082

# Database config / Mysql
spring.datasource.url=jdbc:mysql://localhost:3306/copy_msvc
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop

# Kafka
spring.cloud.stream.bindings.loanEvents-in-0.destination=loan-events
spring.cloud.stream.bindings.loanEvents-in-0.group=copy-service-group
spring.cloud.stream.kafka.binder.brokers=localhost:9092